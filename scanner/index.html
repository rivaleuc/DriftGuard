<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>DriftGuard</title><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-gray-950 text-white min-h-screen p-6"><div class="max-w-2xl mx-auto">
<h1 class="text-2xl font-bold mb-6">🌊 DriftGuard</h1>
<div class="bg-gray-900 rounded-xl p-6 mb-4 border border-gray-800 space-y-3">
<h2 class="text-emerald-400 font-semibold">Register Project</h2>
<input placeholder="Project name" class="w-full bg-gray-950 border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-600 outline-none">
<textarea placeholder="Whitepaper claims..." rows="3" class="w-full bg-gray-950 border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-600 outline-none resize-none"></textarea>
<input placeholder="Project URL" class="w-full bg-gray-950 border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-600 outline-none">
<button class="w-full bg-emerald-600 hover:bg-emerald-700 rounded-lg py-3 font-bold">Register</button>
</div>
<div class="bg-gray-900 rounded-xl p-6 border border-gray-800 space-y-3">
<h2 class="text-red-400 font-semibold">Check Drift</h2>
<input placeholder="Project key" class="w-full bg-gray-950 border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-600 outline-none">
<button class="w-full bg-red-600 hover:bg-red-700 rounded-lg py-3 font-bold">🔍 Scan for Drift</button>
</div>
</div></body></html>
